---
Rfam:
  version: "{rfam_version}"
  method: infernal
  location: Default
  priority: 3
  details:
    default_type: ncRNA
    location: None
    sqlite: False
  parameters:
    - --cpu 1

fpbase:
  version: "{fpbase_version}"
  method: diamond
  location: Default
  priority: 1
  parameters:
    - -k 0
    - --min-orf 1
    - --matrix BLOSUM90
    - --gapopen 10
    - --gapextend 1
    - --algo ctg
    - --id 75
    - --max-hsps 10
    - --culling-overlap 200
    - --seed-cut .001
    - --comp-based-stats 0
    - --threads 1
  details:
    default_type: CDS
    location: Default
    sqlite: True

swissprot:
  version: "{swissprot_version}"
  method: diamond
  location: Default
  priority: 2
  parameters:
    - -k 0
    - --min-orf 1
    - --matrix BLOSUM90
    - --gapopen 10
    - --gapextend 1
    - --algo ctg
    - --id 50
    - --max-hsps 10
    - --culling-overlap 200
    - --seed-cut .001
    - --comp-based-stats 0
    - --threads 1
  details:
    default_type: CDS
    location: Default
    sqlite: True

snapgene:
  version: "{snapgene_version}"
  method: blastn
  location: Default
  priority: 1
  parameters:
    - -perc_identity 95
    - -max_target_seqs 20000
    - -culling_limit 25
    - -word_size 12
    - -num_threads 1
  details:
    default_type: None
    location: Default
    sqlite: True