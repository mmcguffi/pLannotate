---
Rfam:
  method: infernal
  location: Default
  priority: 3
  # relative single-thread runtime; guides concurrent core allocation
  cost: 1.8
  details:
    default_type: ncRNA
    location: None
  parameters: []

fpbase:
  method: diamond
  location: Default
  priority: 1
  # tiny database; effectively free, so it never needs more than one thread
  cost: 0.05
  parameters:
    - -k 0
    - --min-orf 1
    - --matrix BLOSUM90
    - --gapopen 10
    - --gapextend 1
    - --algo ctg
    - --id 75
    - --max-hsps 10
    - --culling-overlap 200
    - --seed-cut .001
    - --comp-based-stats 0
  details:
    default_type: CDS
    location: Default

swissprot:
  method: diamond
  location: Default
  priority: 2
  # large protein database; second-heaviest source
  cost: 1.3
  parameters:
    - -k 0
    - --min-orf 1
    - --matrix BLOSUM90
    - --gapopen 10
    - --gapextend 1
    - --algo ctg
    - --id 50
    - --max-hsps 10
    - --culling-overlap 200
    - --seed-cut .001
    - --comp-based-stats 0
  details:
    default_type: CDS
    location: Default
    priority_from_protein_existence: True

snapgene:
  method: blastn
  location: Default
  priority: 1
  # moderate cost, but blastn thread scaling plateaus quickly
  cost: 0.6
  parameters:
    - -perc_identity 95
    - -max_target_seqs 20000
    - -culling_limit 25
    - -word_size 12
  details: 
    default_type: None
    location: Default
