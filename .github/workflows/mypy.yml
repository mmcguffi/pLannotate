name: Mypy

on:
  push:
  pull_request:
    branches: [master]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Match mypy's configured target and the package's minimum Python.
          python-version: "3.10"
          cache: pip
      - run: python -m pip install '.[lint,test]'
      - run: python -m mypy
