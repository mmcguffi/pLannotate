name: Ruff

on:
  push:
  pull_request:
    branches: [master]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install '.[lint]'
      - run: python -m ruff check .
      - run: python -m ruff format --check .
